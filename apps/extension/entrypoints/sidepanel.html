<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Blog Assistant</title>
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h2 {
      margin: 0 0 16px 0;
      color: #1890ff;
    }
    .feature-list {
      list-style: none;
      padding: 0;
    }
    .feature-list li {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover {
      background: #40a9ff;
    }
  </style>
</head>
<body>
  <h2>🤖 AI Blog Assistant</h2>
  <p>Enhance your blog writing with AI!</p>
  
  <ul class="feature-list">
    <li>✨ Generate catchy titles</li>
    <li>📝 Create content outlines</li>
    <li>🔍 SEO optimization</li>
    <li>🎯 CSDN formatting</li>
  </ul>

  <button class="btn" onclick="openDashboard()">
    Open Dashboard
  </button>
  <button class="btn" style="background: #52c41a;" onclick="analyzePage()">
    Analyze Current Page
  </button>

  <script>
    function openDashboard() {
      window.open('http://localhost:5175', '_blank');
    }

    async function analyzePage() {
      try {
        const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
        if (tab.id) {
          await chrome.scripting.executeScript({
            target: { tabId: tab.id },
            files: ['content/csdn-enhancer.js']
          });
        }
      } catch (error) {
        console.error('Error executing script:', error);
      }
    }
  </script>
</body>
</html>
