<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Blog Assistant</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      color: #1890ff;
    }
    .status {
      padding: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #40a9ff;
    }
  </style>
</head>
<body>
  <h1>🤖 AI Blog Assistant</h1>
  <div class="status">
    Status: Ready
  </div>
  <button id="openSidePanel">Open Side Panel</button>
  <script type="module" src="./index.ts"></script>
</body>
</html>
